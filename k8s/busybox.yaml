apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-app
  template:
    metadata:
      labels:
        app: busybox-app
    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo "{\"level\":\"info\",\"msg\":\"heartbeat\",\"ts\":$(date +%s)}"
                sleep 5
              done
              