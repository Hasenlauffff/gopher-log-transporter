apiVersion: apps/v1
kind: Deployment
metadata:
  name: gopher-log-transporter
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gopher-log-transporter
  template:
    metadata:
      labels:
        app: gopher-log-transporter
    spec:
      containers:
        - name: gopher
          image: gopher-log-transporter:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: gopher-config
          volumeMounts:
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory